name: Android build

on:
  pull_request:
  push:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Restore stable update signing key
        shell: bash
        run: |
          mkdir -p app/signing
          base64 --decode .github/signing/client-ssh-update.jks.b64 > app/signing/client-ssh-update.jks
          keytool -list -keystore app/signing/client-ssh-update.jks -storepass android -alias blackserv-update >/dev/null
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run unit tests
        shell: bash
        run: |
          if ! gradle :app:testDebugUnitTest --stacktrace --console=plain > test.log 2>&1; then
            tail -n 250 test.log
            exit 1
          fi
          tail -n 80 test.log
      - name: Build debug and signed release APKs
        shell: bash
        run: |
          if ! gradle :app:assembleDebug :app:assembleRelease --stacktrace --console=plain > build.log 2>&1; then
            tail -n 250 build.log
            exit 1
          fi
          tail -n 80 build.log
      - name: Verify release signature and checksums
        shell: bash
        run: |
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          test -s "$RELEASE_APK"
          test -s "$DEBUG_APK"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$RELEASE_APK"
          sha256sum "$RELEASE_APK" "$DEBUG_APK" | tee app/build/outputs/apk/SHA256SUMS.txt
      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
