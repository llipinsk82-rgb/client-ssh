name: Android build

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed signing secrets
        shell: bash
        run: bash scripts/check-no-release-secrets.sh
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run unit tests
        shell: bash
        run: |
          if ! gradle :app:testDebugUnitTest --stacktrace --console=plain > test.log 2>&1; then
            tail -n 250 test.log
            exit 1
          fi
          tail -n 80 test.log
      - name: Build debug APK
        shell: bash
        run: |
          if ! gradle :app:assembleDebug --stacktrace --console=plain > build-debug.log 2>&1; then
            tail -n 250 build-debug.log
            exit 1
          fi
          tail -n 80 build-debug.log
          sha256sum app/build/outputs/apk/debug/app-debug.apk | tee app/build/outputs/apk/debug/SHA256SUMS.txt
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Check release signing secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        env:
          CLIENT_SSH_RELEASE_KEYSTORE_B64: ${{ secrets.CLIENT_SSH_RELEASE_KEYSTORE_B64 }}
          CLIENT_SSH_RELEASE_STORE_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_STORE_PASSWORD }}
          CLIENT_SSH_RELEASE_KEY_ALIAS: ${{ secrets.CLIENT_SSH_RELEASE_KEY_ALIAS }}
          CLIENT_SSH_RELEASE_KEY_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_KEY_PASSWORD }}
          CLIENT_SSH_RELEASE_CERT_SHA256: ${{ secrets.CLIENT_SSH_RELEASE_CERT_SHA256 }}
        run: |
          test -n "$CLIENT_SSH_RELEASE_KEYSTORE_B64"
          test -n "$CLIENT_SSH_RELEASE_STORE_PASSWORD"
          test -n "$CLIENT_SSH_RELEASE_KEY_ALIAS"
          test -n "$CLIENT_SSH_RELEASE_KEY_PASSWORD"
          test -n "$CLIENT_SSH_RELEASE_CERT_SHA256"
      - name: Restore release signing key from secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        env:
          CLIENT_SSH_RELEASE_KEYSTORE_B64: ${{ secrets.CLIENT_SSH_RELEASE_KEYSTORE_B64 }}
          CLIENT_SSH_RELEASE_STORE_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_STORE_PASSWORD }}
          CLIENT_SSH_RELEASE_KEY_ALIAS: ${{ secrets.CLIENT_SSH_RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p app/signing
          printf '%s' "$CLIENT_SSH_RELEASE_KEYSTORE_B64" | base64 --decode > app/signing/client-ssh-release.jks
          chmod 600 app/signing/client-ssh-release.jks
          keytool -list \
            -keystore app/signing/client-ssh-release.jks \
            -storepass "$CLIENT_SSH_RELEASE_STORE_PASSWORD" \
            -alias "$CLIENT_SSH_RELEASE_KEY_ALIAS" >/dev/null
      - name: Build signed release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        env:
          CLIENT_SSH_RELEASE_STORE_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_STORE_PASSWORD }}
          CLIENT_SSH_RELEASE_KEY_ALIAS: ${{ secrets.CLIENT_SSH_RELEASE_KEY_ALIAS }}
          CLIENT_SSH_RELEASE_KEY_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_KEY_PASSWORD }}
        run: |
          if ! gradle :app:assembleRelease --stacktrace --console=plain > build-release.log 2>&1; then
            tail -n 250 build-release.log
            exit 1
          fi
          tail -n 80 build-release.log
      - name: Verify release certificate and checksum
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        env:
          CLIENT_SSH_RELEASE_CERT_SHA256: ${{ secrets.CLIENT_SSH_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          test -s "$RELEASE_APK"
          test -x "$APKSIGNER"

          CERT_OUTPUT="$($APKSIGNER verify --verbose --print-certs "$RELEASE_APK")"
          printf '%s\n' "$CERT_OUTPUT"

          ACTUAL_CERT_SHA256="$(printf '%s\n' "$CERT_OUTPUT" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | head -n 1 \
            | tr -d ':[:space:]' \
            | tr '[:upper:]' '[:lower:]')"
          EXPECTED_CERT_SHA256="$(printf '%s' "$CLIENT_SSH_RELEASE_CERT_SHA256" \
            | tr -d ':[:space:]' \
            | tr '[:upper:]' '[:lower:]')"

          test -n "$ACTUAL_CERT_SHA256"
          test "${#ACTUAL_CERT_SHA256}" -eq 64
          test "${#EXPECTED_CERT_SHA256}" -eq 64

          if [[ "$ACTUAL_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]]; then
            echo "Release certificate fingerprint mismatch." >&2
            echo "Expected: $EXPECTED_CERT_SHA256" >&2
            echo "Actual:   $ACTUAL_CERT_SHA256" >&2
            exit 1
          fi

          printf 'Certificate SHA-256: %s\n' "$ACTUAL_CERT_SHA256" \
            | tee app/build/outputs/apk/release/CERTIFICATE_SHA256.txt
          sha256sum "$RELEASE_APK" | tee app/build/outputs/apk/release/SHA256SUMS.txt
      - name: Upload signed release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/SHA256SUMS.txt
            app/build/outputs/apk/release/CERTIFICATE_SHA256.txt
          if-no-files-found: error
          retention-days: 14
      - name: Remove signing key
        if: always()
        shell: bash
        run: rm -f app/signing/client-ssh-release.jks
