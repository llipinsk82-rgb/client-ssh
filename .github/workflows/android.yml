name: Android build

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLIENT_SSH_RELEASE_KEYSTORE_B64: ${{ secrets.CLIENT_SSH_RELEASE_KEYSTORE_B64 }}
      CLIENT_SSH_RELEASE_STORE_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_STORE_PASSWORD }}
      CLIENT_SSH_RELEASE_KEY_ALIAS: ${{ secrets.CLIENT_SSH_RELEASE_KEY_ALIAS }}
      CLIENT_SSH_RELEASE_KEY_PASSWORD: ${{ secrets.CLIENT_SSH_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run unit tests
        shell: bash
        run: |
          if ! gradle :app:testDebugUnitTest --stacktrace --console=plain > test.log 2>&1; then
            tail -n 250 test.log
            exit 1
          fi
          tail -n 80 test.log
      - name: Build debug APK
        shell: bash
        run: |
          if ! gradle :app:assembleDebug --stacktrace --console=plain > build-debug.log 2>&1; then
            tail -n 250 build-debug.log
            exit 1
          fi
          tail -n 80 build-debug.log
          sha256sum app/build/outputs/apk/debug/app-debug.apk | tee app/build/outputs/apk/debug/SHA256SUMS.txt
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Check release signing secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          test -n "$CLIENT_SSH_RELEASE_KEYSTORE_B64"
          test -n "$CLIENT_SSH_RELEASE_STORE_PASSWORD"
          test -n "$CLIENT_SSH_RELEASE_KEY_ALIAS"
          test -n "$CLIENT_SSH_RELEASE_KEY_PASSWORD"
      - name: Restore release signing key from secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          mkdir -p app/signing
          printf '%s' "$CLIENT_SSH_RELEASE_KEYSTORE_B64" | base64 --decode > app/signing/client-ssh-release.jks
          chmod 600 app/signing/client-ssh-release.jks
          keytool -list \
            -keystore app/signing/client-ssh-release.jks \
            -storepass "$CLIENT_SSH_RELEASE_STORE_PASSWORD" \
            -alias "$CLIENT_SSH_RELEASE_KEY_ALIAS" >/dev/null
      - name: Build signed release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          if ! gradle :app:assembleRelease --stacktrace --console=plain > build-release.log 2>&1; then
            tail -n 250 build-release.log
            exit 1
          fi
          tail -n 80 build-release.log
      - name: Verify release signature and checksum
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          test -s "$RELEASE_APK"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$RELEASE_APK"
          sha256sum "$RELEASE_APK" | tee app/build/outputs/apk/release/SHA256SUMS.txt
      - name: Upload signed release APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: client-ssh-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
      - name: Remove signing key
        if: always()
        shell: bash
        run: rm -f app/signing/client-ssh-release.jks
