name: Publish Android release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Restore stable update signing key
        shell: bash
        run: |
          mkdir -p app/signing
          base64 --decode .github/signing/client-ssh-update.jks.b64 > app/signing/client-ssh-update.jks
          keytool -list -keystore app/signing/client-ssh-update.jks -storepass android -alias blackserv-update >/dev/null
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Build signed release APK
        run: gradle :app:assembleRelease --stacktrace --console=plain
      - name: Prepare release asset
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts | head -n1)
          test -n "$VERSION"
          TAG="v$VERSION"
          APK="client-ssh-$VERSION.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          sha256sum "$APK" > "$APK.sha256"
          cat > release-notes.md <<EOF
          Client SSH $VERSION

          - odświeżony wygląd BlackServ: graphite / terminal green / subtelne akcenty bez niebieskich przycisków,
          - ekran główny pokazuje wersję aplikacji od razu po starcie,
          - lista hostów ma bardziej profesjonalny, zwarty wygląd,
          - SFTP dostał kompaktowy widok w stylu Total Commander: cienkie wiersze zamiast dużych bloków,
          - akcje SFTP są przeniesione do menu przy pozycji: otwórz/pobierz, zmień nazwę, usuń,
          - pasek SFTP pokazuje ścieżkę, status i szybkie akcje: wyżej, odśwież, upload, nowy katalog,
          - terminal obsługuje pinch-to-zoom dwoma palcami dla rozmiaru czcionki,
          - dodano dokumentację stanu projektu i historię wydań do kontynuacji w nowym czacie.
          EOF
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          APK: ${{ steps.version.outputs.apk }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" "$APK.sha256" --clobber
            gh release edit "$TAG" --title "Client SSH ${TAG#v}" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" "$APK" "$APK.sha256" \
              --target "$GITHUB_SHA" \
              --title "Client SSH ${TAG#v}" \
              --notes-file release-notes.md \
              --latest
          fi
